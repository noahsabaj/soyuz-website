# Deploy SvelteKit static site to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Run on pushes to main branch
  push:
    branches: ['main']
  # Allow manual trigger
  workflow_dispatch:

# Sets permissions for GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@v4
        with:
          path: soyuz-website

      - name: Checkout soyuz (for docs)
        uses: actions/checkout@v4
        with:
          repository: noahsabaj/soyuz
          path: soyuz

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: soyuz-website
        run: bun install

      - name: Build site
        working-directory: soyuz-website
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'soyuz-website/build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
